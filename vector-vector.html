<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathQuest - Vector Vector</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="number-forge.css">
    <link rel="stylesheet" href="vector-vector.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="game-container">
        <!-- Overlays like settings, tutorial, etc. would go here -->
        <header class="game-header">
            <div class="header-top-row">
                <div class="stats-display">
                    <span>Level: <span id="level-display">1</span></span>
                    <span>Score: <span id="score-display">0</span></span>
                </div>
                <!-- Icons for settings, logout, etc. would go here -->
            </div>
            <h1>Vector Vector</h1>
        </header>

        <main class="game-board">
            <div id="canvas-container">
                <!-- The Matter.js canvas will be inserted here by the script -->
            </div>
        </main>
        <footer class="input-section">
            <form id="vector-form">
                <span class="equation-label">y =</span>
                <input type="text" id="equation-input" placeholder="mx + b" autocomplete="off">
                <button type="submit" class="control-btn primary">Fire</button>
            </form>
        </footer>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="vector-vector.js"></script>
</body>
</html>
