<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathQuest - Game Select</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="number-forge.css">
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="game-select.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <div class="login-panel">
            <h1>Choose Your Adventure</h1>
            <p class="tagline">Which concept will you master today?</p>
            <div class="game-selection">
                <button id="select-number-forge" class="control-btn primary">Number Forge</button>
                <button id="select-vector-vector" class="control-btn primary">Vector Vector</button>
                <button id="select-market-tycoon" class="control-btn primary">Market Tycoon</button>
            </div>
        </div>
    </div>
    <script src="game-select.js"></script>
</body>
</html>
