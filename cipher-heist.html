<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathQuest - Cipher Heist</title>
    <link rel="manifest" href="./manifest.json" crossorigin="use-credentials">
    <link rel="icon" type="image/png" href="./icon.png">
    <link rel="stylesheet" href="cipher-heist.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <div class="header-top-row">
                <div class="stats-display">
                    <span>Score: <span id="score-display">0</span></span>
                </div>
                <div class="timer-display">
                    <span id="time-display">60</span>
                </div>
                <button id="logout-btn" class="icon-btn">🚪</button>
            </div>
            <h1>Cipher Heist</h1>
        </header>

        <main class="game-board">
            <div class="puzzle-section">
                <h2>Crack the Code</h2>
                <div class="equation-display" id="equation-display">x + 5 = 10</div>
            </div>

            <div class="input-section">
                <input type="text" id="answer-input" placeholder="Enter the value of x">
                <button id="submit-btn" class="control-btn primary">Submit</button>
            </div>
             <a href="game-select.html">Back to Game Select</a>
        </main>
    </div>
    <script src="cipher-heist.js"></script>
</body>
</html>
