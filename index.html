<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathQuest - Login</title>    <link rel="manifest" href="./manifest.json" crossorigin="use-credentials">
    <link rel="stylesheet" href="./number-forge.css">
    <link rel="icon" type="image/png" href="./icon.png">
    <link rel="stylesheet" href="./login.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <div class="login-panel">
            <h1>MathQuest</h1>
            <p class="tagline">An educational website with fun, replayable math games.</p>

            <!-- Login Form -->
            <form id="login-form" class="auth-form active">
                <input type="text" id="login-username" placeholder="Username" required>
                <input type="password" id="login-password" placeholder="Password" required>
                <button type="submit" class="control-btn primary">Login</button>
                <p class="form-toggle">No account? <a href="#" id="show-signup">Sign Up</a></p>
            </form>

            <!-- Sign Up Form -->
            <form id="signup-form" class="auth-form">
                <input type="text" id="signup-username" placeholder="Username" required>
                <input type="password" id="signup-password" placeholder="Password" required>
                <div id="password-requirements">
                    <ul>
                        <li id="req-length">At least 5 characters</li>
                        <li id="req-lower">A lowercase letter</li>
                        <li id="req-upper">An uppercase letter</li>
                        <li id="req-symbol">A number or symbol</li>
                    </ul>
                </div>
                <input type="password" id="signup-password-confirm" placeholder="Confirm Password" required>
                <button type="submit" class="control-btn primary">Sign Up</button>
                <p class="form-toggle">Have an account? <a href="#" id="show-login">Login</a></p>
            </form>

            <button id="guest-login-btn" class="control-btn primary">Play as Guest</button>
        </div>
    </div>

    <script src="./login.js"></script>
    <script>
        // Register the service worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                    .then(reg => console.log('Service worker registered.', reg))
                    .catch(err => console.log('Service worker registration failed: ', err));
            });
        }
    </script>
</body>
</html>
